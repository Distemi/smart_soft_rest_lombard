# Dev overrides — applied automatically by `docker compose up`
services:
  php:
    build:
      target: base
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
    volumes:
      - .:/app
    command: ["php-fpm"]

  nginx:
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro

  scheduler:
    profiles: [scheduler]

###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "5432:5432"
###< doctrine/doctrine-bundle ###
