
services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET:-change_me_in_env_local}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8"
      LOMBARD_SECRET_KEY: ${LOMBARD_SECRET_KEY:-}
      LOMBARD_ACCOUNT_ID: ${LOMBARD_ACCOUNT_ID:-}
    volumes:
      - app_var:/app/var
      - app_public:/app/public
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/app/public:ro
    depends_on:
      - php
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET:-change_me_in_env_local}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8"
      LOMBARD_SECRET_KEY: ${LOMBARD_SECRET_KEY:-}
      LOMBARD_ACCOUNT_ID: ${LOMBARD_ACCOUNT_ID:-}
    command: ["php", "bin/console", "messenger:consume", "scheduler_default", "--time-limit=3600"]
    volumes:
      - app_var:/app/var
    restart: unless-stopped

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
  app_var:
  app_public:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
